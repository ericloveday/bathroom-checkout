<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Announcements</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'Montserrat', sans-serif;
    padding: 0;
  }

  .widget {
    background: #0a0a0a;
    border-radius: 12px;
    padding: 18px 20px;
    width: 100%;
  }

  .widget-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 2px solid #cc0000;
  }

  .widget-title {
    font-size: 0.85rem;
    font-weight: 800;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .widget-dot {
    width: 8px; height: 8px;
    background: #cc0000;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .announcement {
    border-left: 3px solid #cc0000;
    padding: 10px 14px;
    margin-bottom: 10px;
    background: #1a1a1a;
    border-radius: 0 8px 8px 0;
  }

  .announcement:last-child { margin-bottom: 0; }

  .ann-date {
    font-size: 0.68rem;
    font-weight: 700;
    color: #cc0000;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .ann-text {
    font-size: 14px;
    color: #ffffff;
    line-height: 1.5;
  }

  .ann-link {
    display: inline-block;
    margin-top: 8px;
    padding: 5px 12px;
    background: #cc0000;
    color: white;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 700;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ann-link:hover { background: #990000; }

  .loading-msg {
    color: #555;
    font-size: 0.82rem;
    font-style: italic;
    text-align: center;
    padding: 12px 0;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <div class="widget-dot"></div>
    <div class="widget-title">Announcements</div>
  </div>
  <div id="announcements-container">
    <p class="loading-msg">Loading announcements...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsja7ruNaLkTDTxyga9qd9TZG2Zz5AjHA",
    authDomain: "bathroom-check-out.firebaseapp.com",
    databaseURL: "https://bathroom-check-out-default-rtdb.firebaseio.com",
    projectId: "bathroom-check-out",
    storageBucket: "bathroom-check-out.firebasestorage.app",
    messagingSenderId: "385219454253",
    appId: "1:385219454253:web:970acbfe28672f73c45fa4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db, 'announcements'), (snapshot) => {
    const container = document.getElementById('announcements-container');
    const data = snapshot.val() || {};
    const today = new Date().toISOString().split('T')[0];
    const announcements = Object.values(data)
      .filter(a => (a.publishDate || a.date) <= today)
      .sort((a, b) => b.date.localeCompare(a.date))
      .slice(0, 3);

    if (!announcements.length) {
      container.innerHTML = '<p class="loading-msg">No announcements at this time.</p>';
      return;
    }

    container.innerHTML = '';
    announcements.forEach(ann => {
      const d = new Date(ann.date + 'T12:00:00');
      const dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
      const div = document.createElement('div');
      div.className = 'announcement';
      const linkHtml = ann.url ? `<a href="${ann.url}" target="_blank" class="ann-link">${ann.urlLabel || 'Click Here'}</a>` : '';
      div.innerHTML = `
        <div class="ann-date">${dateStr}</div>
        <div class="ann-text">${ann.text}</div>
        ${linkHtml}`;
      container.appendChild(div);
    });
  });
</script>
</body>
</html>
